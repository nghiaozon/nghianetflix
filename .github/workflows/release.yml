name: Build and release Windows app

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Keep CI aligned with the Python version used for the verified local
          # release build; changing it changes the embedded python3xx.dll.
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify tag matches app version
        shell: pwsh
        run: |
          $version = python -c "from app_version import APP_VERSION; print(APP_VERSION)"
          if ("v$version" -ne "${{ github.ref_name }}") {
            throw "Tag ${{ github.ref_name }} does not match APP_VERSION=$version"
          }

      - name: Build EXE
        run: pyinstaller --noconfirm --clean NetflixManager.spec

      - name: Create update manifest and SHA-256 file
        shell: pwsh
        run: |
          $hash = (Get-FileHash dist/NetflixManager.exe -Algorithm SHA256).Hash.ToLower()
          "$hash  NetflixManager.exe" | Set-Content dist/NetflixManager.exe.sha256
          $version = python -c "from app_version import APP_VERSION; print(APP_VERSION)"
          $manifest = [ordered]@{
            version = $version
            download_url = "https://github.com/${{ github.repository }}/releases/download/v$version/NetflixManager.exe"
            changelog = "Xem ghi chú phát hành trên GitHub."
            package_type = "exe"
            package_name = "NetflixManager.exe"
            file_name = "NetflixManager.exe"
            executable_name = "NetflixManager.exe"
            sha256 = $hash
            require_authenticode = $false
            publisher = ""
          }
          $manifest | ConvertTo-Json | Set-Content dist/update.json -Encoding utf8

      - name: Validate update manifest
        shell: pwsh
        run: |
          python -c "import json, updater; updater.validate_manifest(json.load(open('dist/update.json', encoding='utf-8-sig')), require_hash=True)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/NetflixManager.exe
            dist/NetflixManager.exe.sha256
            dist/update.json
          generate_release_notes: true

      # Version 1.0.0 used a version-pinned manifest URL. Keep that URL alive so
      # already-installed copies can discover and move to the newest release.
      - name: Update legacy v1.0.0 manifest
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload v1.0.0 dist/update.json --clobber --repo "${{ github.repository }}"
